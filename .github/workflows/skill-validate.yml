name: Skill Validate
on:
  pull_request:
    paths:
      - 'skills/**'
      - 'tests/**'
      - '.claude-plugin/**'
      - 'scripts/test.sh'

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: pip3 install --break-system-packages ruff pytest
      - name: Lint (all skills + tests)
        run: ruff check skills/*/scripts tests
      - name: Tests (one isolated process per skill)
        run: bash scripts/test.sh
      - name: SKILL.md frontmatter
        run: |
          for f in skills/*/SKILL.md; do
            head -1 "$f" | grep -q '^---' || { echo "$f missing YAML frontmatter"; exit 1; }
          done
          echo "All SKILL.md have frontmatter"
      - name: plugin.json has exactly the 4 Anthropic keys
        run: |
          python3 -c "
          import json
          m = json.load(open('.claude-plugin/plugin.json'))
          assert set(m) == {'name', 'version', 'description', 'author'}, m
          print('plugin.json OK')
          "
      - name: VLM prompt anchors resolve
        run: |
          python3 -c "
          import re, glob
          anchors = set()
          for f in glob.glob('skills/video-understanding/scripts/*.py'):
              for m in re.finditer(r'load_prompt\([\"\\x27](.+?)[\"\\x27]\)', open(f).read()):
                  anchors.add(m.group(1))
          content = open('skills/video-understanding/references/prompt-templates.md').read()
          missing = [a for a in anchors if f'### {a}' not in content]
          assert not missing, f'MISSING prompt anchors: {missing}'
          print(f'All {len(anchors)} prompt anchors OK')
          "
