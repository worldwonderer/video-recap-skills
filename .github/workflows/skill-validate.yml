name: Skill Validate
on:
  # Run on every PR so the required status checks always report — a path filter
  # here would let docs-only PRs stall forever under branch protection.
  pull_request:

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: python -m pip install ruff pytest
      - name: Lint (all skills + tests)
        run: ruff check skills tests scripts
      - name: Tests and packaging contracts (one isolated process per skill)
        run: python scripts/test.py
